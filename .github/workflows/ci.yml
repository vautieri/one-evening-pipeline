name: CI — Build, Test & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Clang (if needed)
        if: matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Set compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DENABLE_GTEST=ON
          -DENABLE_CATCH2=ON
          -DENABLE_DOCTEST=ON
          -DENABLE_BOOSTTEST=OFF
          -DENABLE_CPPUNIT=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --output-junit test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: build/test-results.xml

  coverage:
    name: Code Coverage (gcov)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Configure with coverage flags
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="--coverage"
          -DCMAKE_CXX_FLAGS="--coverage"
          -DENABLE_GTEST=ON
          -DENABLE_CATCH2=ON
          -DENABLE_DOCTEST=ON
          -DENABLE_BOOSTTEST=OFF
          -DENABLE_CPPUNIT=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Collect coverage data
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          # Remove framework and system headers from report
          lcov --remove coverage.info \
            '/usr/*' \
            '*/build/_deps/*' \
            '*/tests/*' \
            --output-file coverage-filtered.info --ignore-errors unused

      - name: Coverage summary
        run: lcov --summary coverage-filtered.info

      - name: Generate HTML coverage report
        run: genhtml coverage-filtered.info --output-directory coverage-html --title "Unit Test Coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
